<app-modal size="sm" (close)="close.emit()">
  <app-modal-header
    [icon]="true"
    title="Exportar Inventario"
    (close)="close.emit()"
  >
    <svg icon class="w-5 h-5 text-[#81000A] dark:text-[#EF4444]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
    </svg>
  </app-modal-header>

  <div class="p-6 flex flex-col gap-3">
    <p class="font-['Inter'] text-sm text-[#4C616C] dark:text-[#8A9BA8] mb-2">Selecciona el formato de exportación:</p>

    <button (click)="exportar('excel')"
      class="flex items-center gap-4 p-4 bg-white dark:bg-black border border-gray-200 dark:border-[#1F1F1F] rounded-xl hover:border-[#81000A]/50 dark:hover:border-[#EF4444]/50 hover:bg-[#FFF3F3]/30 dark:hover:bg-[rgba(239,68,68,0.1)] transition-all cursor-pointer group">
      <div class="w-12 h-12 rounded-lg bg-[#217346]/10 flex items-center justify-center shrink-0 group-hover:bg-[#217346]/20 transition-colors">
        <svg class="w-6 h-6 text-[#217346]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14,2H6A2,2,0,0,0,4,4V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V8ZM18,20H6V4h7V9h5V20Z" opacity="0.4" />
          <path d="M14,2l6,6h-6V2Z" />
          <rect x="8" y="13" width="3" height="5" rx="0.5" fill="#217346" />
          <rect x="13" y="13" width="3" height="5" rx="0.5" fill="#217346" />
        </svg>
      </div>
      <div class="flex flex-col items-start">
        <span class="font-['Inter'] font-bold text-[#111D23] dark:text-white group-hover:text-[#217346] transition-colors">Microsoft Excel (.xlsx)</span>
        <span class="font-['Inter'] text-xs text-[#4C616C] dark:text-[#8A9BA8]">Formato de hoja de cálculo con filtros y fórmulas</span>
      </div>
    </button>

    <button (click)="exportar('pdf')"
      class="flex items-center gap-4 p-4 bg-white dark:bg-black border border-gray-200 dark:border-[#1F1F1F] rounded-xl hover:border-[#81000A]/50 dark:hover:border-[#EF4444]/50 hover:bg-[#FFF3F3]/30 dark:hover:bg-[rgba(239,68,68,0.1)] transition-all cursor-pointer group">
      <div class="w-12 h-12 rounded-lg bg-[#B30B00]/10 flex items-center justify-center shrink-0 group-hover:bg-[#B30B00]/20 transition-colors">
        <svg class="w-6 h-6 text-[#B30B00]" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14,2H6A2,2,0,0,0,4,4V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V8ZM18,20H6V4h7V9h5V20Z" opacity="0.4" />
          <path d="M14,2l6,6h-6V2Z" />
          <text x="8" y="18" font-size="7" font-weight="bold" fill="#B30B00">PDF</text>
        </svg>
      </div>
      <div class="flex flex-col items-start">
        <span class="font-['Inter'] font-bold text-[#111D23] dark:text-white group-hover:text-[#B30B00] transition-colors">Adobe PDF (.pdf)</span>
        <span class="font-['Inter'] text-xs text-[#4C616C] dark:text-[#8A9BA8]">Formato portable ideal para impresión y distribución</span>
      </div>
    </button>
  </div>

  <app-modal-footer>
    <button (click)="close.emit()" type="button" class="px-5 py-2.5 font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] hover:text-[#111D23] dark:hover:text-white hover:bg-gray-200 dark:hover:bg-[#141414] rounded-lg transition-colors cursor-pointer">
      Cancelar
    </button>
  </app-modal-footer>
</app-modal>
