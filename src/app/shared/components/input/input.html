<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="label-form">
      {{ label() }}
      @if (required()) { <span class="text-[#81000A]">*</span> }
    </label>
  }
  @if (prefix()) {
    <div class="relative">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#8A9BA8]">{{ prefix() }}</span>
      <input
        [type]="type()"
        [placeholder]="placeholder()"
        [ngModel]="value()"
        (ngModelChange)="onValueChange($event)"
        [ngModelOptions]="{ standalone: true }"
        [ngClass]="{ 'input-error': error(), 'pl-8': prefix() }"
        class="input-base"
      />
    </div>
  } @else {
    <input
      [type]="type()"
      [placeholder]="placeholder()"
      [ngModel]="value()"
      (ngModelChange)="onValueChange($event)"
      [ngModelOptions]="{ standalone: true }"
      [ngClass]="{ 'input-error': error() }"
      class="input-base"
    />
  }
  @if (hint()) {
    <span class="font-['Inter'] text-[11px] text-[#8A9BA8]">{{ hint() }}</span>
  }
  @if (error()) {
    <span class="text-error">{{ error() }}</span>
  }
</div>
