<app-modal size="md" (close)="close.emit()">
  @let f = form();
  @let errs = formErrors();

  <app-modal-header
    [icon]="true"
    title="Editar Usuario"
    subtitle="Actualiza los datos del usuario"
    (close)="close.emit()"
  >
    <svg icon class="w-5 h-5 text-[#81000A] dark:text-[#EF4444]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
    </svg>
  </app-modal-header>

  @if (errs['general']) {
    <div class="mx-6 mt-4 rounded-lg border border-[#E2BEBA] bg-[#81000A]/10 px-4 py-3 font-['Inter'] text-sm font-semibold text-[#81000A] dark:bg-[#81000A]/20 dark:text-[#EF4444]">
      {{ errs['general'] }}
    </div>
  }

  <div class="p-6 overflow-y-auto max-h-[70vh] flex flex-col gap-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Nombres <span class="text-[#81000A]">*</span></label>
        <input
          type="text"
          placeholder="Ej. Juan"
          [ngModel]="f.firstName"
          (ngModelChange)="updateForm('firstName', $event)"
          [ngModelOptions]="{ standalone: true }"
          class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
          [ngClass]="errs['firstName'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
        />
        @if (errs['firstName']) {
          <span class="font-['Inter'] text-xs text-red-500">{{ errs['firstName'] }}</span>
        }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Apellidos <span class="text-[#81000A]">*</span></label>
        <input
          type="text"
          placeholder="Ej. Pérez"
          [ngModel]="f.lastName"
          (ngModelChange)="updateForm('lastName', $event)"
          [ngModelOptions]="{ standalone: true }"
          class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
          [ngClass]="errs['lastName'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
        />
        @if (errs['lastName']) {
          <span class="font-['Inter'] text-xs text-red-500">{{ errs['lastName'] }}</span>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Rol <span class="text-[#81000A]">*</span></label>
      <select
        [ngModel]="f.roleName"
        (ngModelChange)="updateForm('roleName', $event)"
        [ngModelOptions]="{ standalone: true }"
        class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors cursor-pointer"
        [ngClass]="errs['roleName'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
      >
        <option value="" disabled>Seleccione un rol</option>
        @for (role of roles(); track role.id) {
          <option [value]="role.name">{{ role.name }}</option>
        }
      </select>
      @if (errs['roleName']) {
        <span class="font-['Inter'] text-xs text-red-500">{{ errs['roleName'] }}</span>
      }
    </div>
  </div>

  <app-modal-footer>
    <button (click)="close.emit()" type="button" class="px-5 py-2.5 font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] hover:text-[#111D23] dark:hover:text-white hover:bg-gray-200 dark:hover:bg-[#141414] rounded-lg transition-colors cursor-pointer">
      Cancelar
    </button>
    <button (click)="save()" [disabled]="isSaving()" class="flex items-center gap-2 px-6 py-2.5 bg-[#81000A] hover:bg-[#6a0008] text-white font-['Inter'] font-semibold text-sm rounded-lg shadow-md transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
      @if (isSaving()) {
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>Guardando...</span>
      } @else {
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Guardar Cambios</span>
      }
    </button>
  </app-modal-footer>
</app-modal>
