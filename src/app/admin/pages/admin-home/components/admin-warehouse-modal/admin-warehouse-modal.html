<app-modal size="md" (close)="close.emit()">
  @let f = form();
  @let errs = formErrors();

  <app-modal-header
    [icon]="true"
    [title]="isEditing() ? 'Editar Almacén' : 'Nuevo Almacén'"
    [subtitle]="isEditing() ? 'Actualiza los datos del almacén' : 'Completa los datos para crear un nuevo almacén'"
    (close)="close.emit()"
  >
    <svg icon class="w-5 h-5 text-[#81000A] dark:text-[#EF4444]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
    </svg>
  </app-modal-header>

  @if (errs['general']) {
    <div class="mx-6 mt-4 rounded-lg border border-[#E2BEBA] bg-[#81000A]/10 px-4 py-3 font-['Inter'] text-sm font-semibold text-[#81000A] dark:bg-[#81000A]/20 dark:text-[#EF4444]">
      {{ errs['general'] }}
    </div>
  }

  <div class="p-6 overflow-y-auto max-h-[70vh] flex flex-col gap-4">
    <div class="flex flex-col gap-1.5">
      <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">ID Sede <span class="text-[#81000A]">*</span></label>
      <input
        type="number"
        placeholder="1"
        [ngModel]="f.idSede"
        (ngModelChange)="updateForm('idSede', $event)"
        [ngModelOptions]="{ standalone: true }"
        class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
        [ngClass]="errs['idSede'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
      />
      @if (errs['idSede']) {
        <span class="font-['Inter'] text-xs text-red-500">{{ errs['idSede'] }}</span>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Código <span class="text-[#81000A]">*</span></label>
        <input
          type="text"
          placeholder="Ej. ALM-001"
          [ngModel]="f.codAlm"
          (ngModelChange)="updateForm('codAlm', $event)"
          [ngModelOptions]="{ standalone: true }"
          class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
          [ngClass]="errs['codAlm'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
        />
        @if (errs['codAlm']) {
          <span class="font-['Inter'] text-xs text-red-500">{{ errs['codAlm'] }}</span>
        }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Nombre <span class="text-[#81000A]">*</span></label>
        <input
          type="text"
          placeholder="Ej. Almacén Principal"
          [ngModel]="f.nombre"
          (ngModelChange)="updateForm('nombre', $event)"
          [ngModelOptions]="{ standalone: true }"
          class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
          [ngClass]="errs['nombre'] ? 'border-red-500' : 'border-gray-200 dark:border-[#1F1F1F]'"
        />
        @if (errs['nombre']) {
          <span class="font-['Inter'] text-xs text-red-500">{{ errs['nombre'] }}</span>
        }
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8]">Tipo</label>
      <input
        type="text"
        placeholder="Ej. General, Frío, Peligrosos"
        [ngModel]="f.tipo"
        (ngModelChange)="updateForm('tipo', $event)"
        [ngModelOptions]="{ standalone: true }"
        class="w-full px-4 py-2.5 bg-white dark:bg-[#0A0A0A] border rounded-lg font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#81000A]/50 transition-colors"
      />
    </div>
  </div>

  <app-modal-footer>
    <button (click)="close.emit()" type="button" class="px-5 py-2.5 font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] hover:text-[#111D23] dark:hover:text-white hover:bg-gray-200 dark:hover:bg-[#141414] rounded-lg transition-colors cursor-pointer">
      Cancelar
    </button>
    <button (click)="save()" [disabled]="isSaving()" class="flex items-center gap-2 px-6 py-2.5 bg-[#81000A] hover:bg-[#6a0008] text-white font-['Inter'] font-semibold text-sm rounded-lg shadow-md transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
      @if (isSaving()) {
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>Guardando...</span>
      } @else {
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>{{ isEditing() ? 'Guardar Cambios' : 'Crear Almacén' }}</span>
      }
    </button>
  </app-modal-footer>
</app-modal>
