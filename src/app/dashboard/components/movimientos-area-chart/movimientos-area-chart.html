<div class="flex flex-col items-start p-6 bg-white dark:bg-[#0A0A0A] border border-gray-100 dark:border-[#1F1F1F] shadow-sm rounded-xl transition-all duration-300">
  <div class="flex justify-between items-start w-full mb-4">
    <div class="flex flex-col gap-1">
      <h3 class="font-['Work_Sans'] font-bold text-xl text-[#111D23] dark:text-white">
        Movimientos por Tiempo
      </h3>
      <p class="font-['Inter'] font-medium text-sm text-[#4C616C] dark:text-[#8A9BA8]">
        Ingresos, salidas y ajustes registrados
      </p>
    </div>
  </div>
  <div class="w-full flex-1">
    @if (data().length > 0) {
      <apx-chart
        [series]="chartSeries()"
        [chart]="chartOptions()"
        [xaxis]="xaxis()"
        [yaxis]="yaxis()"
        [stroke]="stroke()"
        [fill]="fill()"
        [colors]="colors()"
        [legend]="legend()"
        [dataLabels]="dataLabels()"
        [grid]="grid()"
        [tooltip]="tooltip()"
      />
    } @else {
      <div class="flex flex-col items-center justify-center gap-3 py-16">
        <svg class="w-16 h-16 text-[#4C616C] dark:text-[#8A9BA8] opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="font-['Inter'] text-sm font-medium text-[#4C616C] dark:text-[#8A9BA8]">No hay movimientos registrados</span>
        <span class="font-['Inter'] text-xs text-[#4C616C] dark:text-[#8A9BA8] opacity-60">Los datos aparecerán cuando se registren ingresos o salidas.</span>
      </div>
    }
  </div>
</div>
