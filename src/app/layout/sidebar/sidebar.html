<aside
  class="relative w-[288px] h-screen bg-white dark:bg-[#1B1B1B] flex flex-col justify-between shrink-0 border-r border-gray-100 dark:border-[#313131] pt-20 pb-8 transition-colors duration-300 z-20"
>
  <div class="flex flex-col w-full">
    <div class="flex items-center gap-3 px-8 mb-8">
      <div class="flex justify-center items-center w-10 h-10 bg-[#81000A] shrink-0 rounded-sm">
        <div class="w-5 h-5 bg-white"></div>
      </div>
      <span
        class="font-['Work_Sans'] font-black text-sm leading-tight uppercase text-[#111D23] dark:text-white transition-colors"
      >
        portable global technology
      </span>
    </div>

    <nav class="flex flex-col w-full">
      <a
        routerLink="/dashboard"
        routerLinkActive="active-link"
        class="group relative flex items-center gap-4 px-8 py-4 cursor-pointer transition-colors duration-200"
      >
        <div
          class="absolute left-0 top-0 w-1 h-full bg-transparent group-[.active-link]:bg-[#81000A] transition-colors"
        ></div>

        <div
          class="absolute inset-0 bg-transparent group-[.active-link]:bg-[#FFF3F3] dark:group-[.active-link]:bg-[#222222] group-hover:bg-gray-50 dark:group-hover:bg-[#222222]/50 transition-colors z-0"
        ></div>

        <svg
          class="w-5 h-5 text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
          />
        </svg>
        <span
          class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
        >
          Dashboard
        </span>
      </a>

      <a
        routerLink="/inventario"
        routerLinkActive="active-link"
        class="group relative flex items-center gap-4 px-8 py-4 cursor-pointer transition-colors duration-200"
      >
        <div
          class="absolute left-0 top-0 w-1 h-full bg-transparent group-[.active-link]:bg-[#81000A] transition-colors"
        ></div>
        <div
          class="absolute inset-0 bg-transparent group-[.active-link]:bg-[#FFF3F3] dark:group-[.active-link]:bg-[#222222] group-hover:bg-gray-50 dark:group-hover:bg-[#222222]/50 transition-colors z-0"
        ></div>

        <svg
          class="w-5 h-5 text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
          />
        </svg>
        <span
          class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
        >
          Inventario
        </span>
      </a>

      <a
        routerLink="/tracking"
        routerLinkActive="active-link"
        class="group relative flex items-center gap-4 px-8 py-4 cursor-pointer transition-colors duration-200"
      >
        <div
          class="absolute left-0 top-0 w-1 h-full bg-transparent group-[.active-link]:bg-[#81000A] transition-colors"
        ></div>
        <div
          class="absolute inset-0 bg-transparent group-[.active-link]:bg-[#FFF3F3] dark:group-[.active-link]:bg-[#222222] group-hover:bg-gray-50 dark:group-hover:bg-[#222222]/50 transition-colors z-0"
        ></div>

        <svg
          class="w-5 h-5 text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"
          />
        </svg>
        <span
          class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
        >
          Órdenes Tracking
        </span>
      </a>

      <a
        routerLink="/admin/config"
        routerLinkActive="active-link"
        class="group relative flex items-center gap-4 px-8 py-4 cursor-pointer transition-colors duration-200 mt-4"
      >
        <div
          class="absolute left-0 top-0 w-1 h-full bg-transparent group-[.active-link]:bg-[#81000A] transition-colors"
        ></div>
        <div
          class="absolute inset-0 bg-transparent group-[.active-link]:bg-[#FFF3F3] dark:group-[.active-link]:bg-[#222222] group-hover:bg-gray-50 dark:group-hover:bg-[#222222]/50 transition-colors z-0"
        ></div>

        <svg
          class="w-5 h-5 text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
        <span
          class="font-['Inter'] font-semibold text-sm text-[#4C616C] dark:text-[#8A9BA8] group-[.active-link]:text-[#81000A] dark:group-[.active-link]:text-white group-hover:text-[#81000A] dark:group-hover:text-white relative z-10 transition-colors"
        >
          Configuración
        </span>
      </a>
    </nav>
  </div>

  <div
    class="flex flex-col w-full gap-4 pt-6 px-8 border-t border-gray-100 dark:border-[#313131] transition-colors"
  >
    <div class="flex items-center gap-3 w-full">
      <div
        class="flex justify-center items-center w-10 h-10 rounded-full bg-gray-50 dark:bg-[#222222] border border-gray-100 dark:border-[#313131] shrink-0 overflow-hidden transition-colors"
      >
        <svg
          class="w-6 h-6 text-[#81000A] dark:text-[#8A9BA8]"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            clip-rule="evenodd"
          />
        </svg>
      </div>
      <div class="flex flex-col overflow-hidden">
        <span
          class="font-['Inter'] font-bold text-sm text-[#111D23] dark:text-white truncate transition-colors"
          >{{ userName }}</span
        >
        <span
          class="font-['Inter'] font-medium text-[11px] uppercase tracking-wider text-[#4C616C] dark:text-[#8A9BA8] truncate transition-colors"
          >{{ userRole }}</span
        >
      </div>
    </div>

    <button
      (click)="onLogout()"
      class="flex items-center gap-3 w-full py-2.5 rounded-lg text-[#4C616C] dark:text-[#8A9BA8] hover:text-[#81000A] dark:hover:text-white transition-colors group cursor-pointer"
    >
      <svg
        class="w-5 h-5 text-[#4C616C] dark:text-[#8A9BA8] group-hover:text-[#81000A] dark:group-hover:text-white transition-colors"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
        />
      </svg>
      <span class="font-['Inter'] font-semibold text-sm">Cerrar sesión</span>
    </button>
  </div>
</aside>
