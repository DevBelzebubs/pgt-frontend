<header class="w-full h-[80px] bg-[#F4FAFF] dark:bg-[#111D23] flex items-center justify-between px-8 shadow-[0px_4px_24px_rgba(17,29,35,0.04)] dark:shadow-none border-b border-[rgba(226,190,186,0.2)] dark:border-[rgba(255,255,255,0.05)] transition-colors duration-300 z-10 shrink-0">
  
  <div class="relative flex items-center">
    <div class="absolute left-4 flex items-center pointer-events-none">
      <svg class="w-[18px] h-[18px] text-[#4C616C] dark:text-[#8A9BA8] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input 
      type="text" 
      placeholder="Buscar..." 
      class="w-[280px] h-10 bg-[#E9F6FD] dark:bg-[#1A262D] rounded-full pl-[42px] pr-4 font-['Inter'] text-sm text-[#111D23] dark:text-white placeholder-[#4C616C] dark:placeholder-[#8A9BA8] focus:outline-none focus:ring-2 focus:ring-[#004A77] dark:focus:ring-[#81000A] transition-colors"
    >
  </div>

  <div class="flex items-center gap-4">
    
    <div class="flex items-center gap-1">
      
      <button class="relative p-2 rounded-full hover:bg-[#DDEAF2] dark:hover:bg-[rgba(255,255,255,0.05)] transition-colors group cursor-pointer border-none outline-none">
        <svg class="w-[20px] h-[20px] text-[#4C616C] dark:text-[#8A9BA8] group-hover:text-[#004A77] dark:group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        @if (hasUnreadNotifications()) {
          <div class="absolute top-[7px] right-[7px] w-2 h-2 bg-[#81000A] rounded-full border-[1.5px] border-[#F4FAFF] dark:border-[#111D23] transition-colors"></div>
        }
      </button>

      <button class="relative p-2 rounded-full hover:bg-[#DDEAF2] dark:hover:bg-[rgba(255,255,255,0.05)] transition-colors group cursor-pointer border-none outline-none">
        <svg class="w-[20px] h-[20px] text-[#4C616C] dark:text-[#8A9BA8] group-hover:text-[#004A77] dark:group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>

      <button class="relative p-2 rounded-full hover:bg-[#DDEAF2] dark:hover:bg-[rgba(255,255,255,0.05)] transition-colors group cursor-pointer border-none outline-none">
        <svg class="w-[20px] h-[20px] text-[#4C616C] dark:text-[#8A9BA8] group-hover:text-[#004A77] dark:group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </button>

    </div>

    <div class="h-8 w-px bg-[rgba(226,190,186,0.3)] dark:bg-[rgba(255,255,255,0.1)] transition-colors"></div>

    <div class="flex items-center gap-3 cursor-pointer group">
      <div class="w-10 h-10 rounded-full bg-[#DDEAF2] dark:bg-[#1A262D] border border-[rgba(226,190,186,0.2)] dark:border-[rgba(255,255,255,0.1)] flex items-center justify-center overflow-hidden transition-colors">
         <svg class="w-6 h-6 text-[#4C616C] dark:text-[#8A9BA8]" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
        </svg>
      </div>
      
      <div class="flex items-center gap-1">
        <span class="font-['Inter'] font-semibold text-sm text-[#111D23] dark:text-white group-hover:text-[#81000A] dark:group-hover:text-[#E2BEBA] transition-colors">
          {{ userName() }}
        </span>
        <svg class="w-4 h-4 text-[#4C616C] dark:text-[#8A9BA8] group-hover:text-[#81000A] dark:group-hover:text-[#E2BEBA] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>

  </div>

</header>
